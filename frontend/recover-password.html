<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password - IoT Management System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <a href="login.html" class="back-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Login
    </a>

    <div class="form-container">
        <div class="form-card">
            <div class="form-header">
                <h1 class="form-title">Recover Password</h1>
                <p class="form-subtitle">Enter your email to receive password reset instructions</p>
            </div>

            <form id="recoverForm" onsubmit="handleRecover(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" name="email" required placeholder="user@example.com">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
            </form>

            <div class="form-footer">
                <p style="color: var(--text-secondary);">
                    Remember your password? 
                    <a href="login.html" class="form-link">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
